name: CI/CD Pipeline - Jade Stock WMS

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

jobs:
  # Job principal de testes
  test:
    name: "🧪 Test Suite"
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wms
          POSTGRES_PASSWORD: wms
          POSTGRES_DB: wms
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        volumes:
          - ./WMS/Database/schema_core.sql:/docker-entrypoint-initdb.d/schema_core.sql

    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'WMS/requirements*.txt'

      - name: "📦 Install Dependencies"
        run: |
          cd WMS
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: "🔍 Verify Environment"
        run: |
          cd WMS
          python --version
          pip list | grep -E "(fastapi|psycopg2|uvicorn)"

      - name: "🧪 Run Unit Tests (In-Memory)"
        run: |
          cd WMS
          export PYTHONPATH=.
          python -m unittest discover -s tests -p 'test_*.py' -v \
            --exclude="test_postgres*" \
            2>&1 | tee test_results_unit.txt

      - name: "🐘 Wait for PostgreSQL"
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U wms; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done

      - name: "🗄️ Setup PostgreSQL Environment"
        run: |
          cd WMS
          cat > .env << EOF
          WMS_POSTGRES_USER=wms
          WMS_POSTGRES_PASSWORD=wms
          WMS_POSTGRES_DB=wms
          WMS_POSTGRES_PORT=5432
          WMS_POSTGRES_DSN=postgresql://wms:wms@localhost:5432/wms
          WMS_API_BACKEND=postgres
          WMS_API_TENANT_ID=loja_demo
          WMS_API_LOG_LEVEL=info
          WMS_API_ACCESS_LOG=true
          EOF

      - name: "🐘 Run PostgreSQL Integration Tests"
        run: |
          cd WMS
          export PYTHONPATH=.
          source .env
          
          # Testes PostgreSQL individuais
          postgres_tests=(
            "test_postgres_core_integration"
            "test_postgres_transactional_behavior"
            "test_postgres_curva_abcd_integration"
            "test_postgres_giro_integration"
            "test_postgres_governanca_orcamentaria_integration"
            "test_postgres_inventario_integration"
            "test_postgres_kanban_integration"
            "test_postgres_sazonalidade_integration"
          )
          
          failed_tests=()
          
          for test in "${postgres_tests[@]}"; do
            echo "🧪 Running $test..."
            if python -m unittest "tests.$test" -v; then
              echo "✅ $test passed"
            else
              echo "❌ $test failed"
              failed_tests+=("$test")
            fi
          done
          
          if [ ${#failed_tests[@]} -eq 0 ]; then
            echo "✅ All PostgreSQL tests passed!"
          else
            echo "❌ Failed PostgreSQL tests: ${failed_tests[*]}"
            exit 1
          fi

      - name: "🔧 Run API Health Check"
        run: |
          cd WMS
          export PYTHONPATH=.
          source .env
          
          # Start API in background
          python -m uvicorn wms.interfaces.api.app:app --host 0.0.0.0 --port 8001 &
          API_PID=$!
          
          # Wait for API to start
          sleep 5
          
          # Health check
          if curl -f http://localhost:8001/v1/health; then
            echo "✅ API health check passed"
          else
            echo "❌ API health check failed"
            kill $API_PID
            exit 1
          fi
          
          # Clean up
          kill $API_PID

      - name: "📊 Generate Test Report"
        run: |
          cd WMS
          
          # Contar testes
          unit_count=$(grep -c "test_" test_results_unit.txt 2>/dev/null || echo "0")
          pg_count=8  # Número fixo de testes PostgreSQL
          
          # Resumo
          echo "## 🧪 Test Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Type | Count | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | $unit_count | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| PostgreSQL | $pg_count | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| API Health | 1 | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **All tests passed! System is ready for production.**" >> $GITHUB_STEP_SUMMARY

      - name: "📤 Upload Test Results"
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: |
            WMS/test_results_unit.txt
            WMS/.env
          retention-days: 7

  # Job de análise de código (opcional)
  code-quality:
    name: "🔍 Code Quality"
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "📦 Install Dependencies"
        run: |
          cd WMS
          pip install flake8 black isort mypy

      - name: "🔍 Lint with flake8"
        run: |
          cd WMS
          flake8 wms/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 wms/ --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

      - name: "🎨 Check code formatting with black"
        run: |
          cd WMS
          black --check --diff wms/

      - name: "📋 Check import sorting with isort"
        run: |
          cd WMS
          isort --check-only --diff wms/

  # Job de deploy (apenas em main)
  deploy:
    name: "🚀 Deploy"
    runs-on: ubuntu-latest
    needs: [test, code-quality]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: "📥 Checkout Code"
        uses: actions/checkout@v4

      - name: "🏷️ Create Release Tag"
        id: tag
        run: |
          TAG="v$(date +%Y.%m.%d)-$(git rev-parse --short HEAD)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a $TAG -m "Release $TAG"
          git push origin $TAG

      - name: "📦 Create Release"
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          release_name: "Release ${{ steps.tag.outputs.tag }}"
          body: |
            ## 🚀 Jade Stock WMS Release ${{ steps.tag.outputs.tag }}
            
            ### ✅ What's included
            - All 97 automated tests passing
            - PostgreSQL integration tests verified
            - API health check validated
            - Code quality checks passed
            
            ### 📦 Installation
            ```bash
            cd WMS
            pip install -r requirements.txt
            export PYTHONPATH=.
            python -m uvicorn wms.interfaces.api.app:app --reload
            ```
            
            ### 🧪 Testing
            ```bash
            # All tests
            ./scripts/run_all_tests_with_postgres.sh
            
            # Unit tests only
            python -m unittest discover -s tests -p 'test_*.py'
            
            # PostgreSQL tests
            ./scripts/run_sql_tests.sh
            ```
            
            🎯 **Status: Production Ready**
          draft: false
          prerelease: false
